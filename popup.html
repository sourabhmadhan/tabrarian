<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <div class="brand">
      <svg class="logo" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <rect x="0" y="0" width="24" height="24" rx="5.5" fill="#2b3440"/>
        <rect x="4.1"  y="5.6" width="3.4" height="13.5" rx="0.9" class="l-blue"/>
        <rect x="8.6"  y="4.5" width="3.4" height="14.6" rx="0.9" class="l-red"/>
        <rect x="13.1" y="6.4" width="3.4" height="12.7" rx="0.9" class="l-yellow"/>
        <rect x="17.6" y="5.1" width="3.4" height="14"   rx="0.9" class="l-green"/>
      </svg>
      <h1>Tabrarian</h1>
    </div>
    <span id="tab-count" class="badge"></span>
  </header>

  <div class="actions">
    <button id="group-btn" class="primary">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M4 4h7v7H4zm9 0h7v7h-7zM4 13h7v7H4zm9 0h7v7h-7z"/></svg>
      Group tabs now
    </button>
    <button id="collapse-btn" data-tip="Collapse all groups in the tab strip">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" d="M6 15l6-6 6 6"/></svg>
    </button>
    <button id="ungroup-btn" data-tip="Ungroup everything — all tabs stay open">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M5 5l4 4m6 6l4 4M19 5l-4 4M9 15l-4 4"/></svg>
    </button>
  </div>

  <div id="dupe-row" class="dupe-row hidden">
    <span id="dupe-label"></span>
    <button id="dupe-btn" class="danger">Close duplicates</button>
  </div>

  <div class="settings">
    <label class="switch-row">
      <span>Auto-group new tabs</span>
      <span class="switch"><input type="checkbox" id="auto-toggle" /><span class="slider"></span></span>
    </label>
    <label class="switch-row">
      <span>Reorganize existing groups</span>
      <span class="switch"><input type="checkbox" id="regroup-toggle" /><span class="slider"></span></span>
    </label>
    <label class="switch-row" title="When you switch tabs, expand that group and collapse the rest">
      <span>Focus mode — collapse other groups</span>
      <span class="switch"><input type="checkbox" id="focus-toggle" /><span class="slider"></span></span>
    </label>
    <label class="switch-row" title="Free RAM: tabs in collapsed groups unused for 10+ min go to sleep. They stay in the strip and reload where they were when clicked.">
      <span>Memory saver — sleep collapsed groups</span>
      <span class="switch"><input type="checkbox" id="memory-toggle" /><span class="slider"></span></span>
    </label>
  </div>

  <div id="sleep-stat" class="sleep-stat hidden"></div>

  <input type="search" id="search" placeholder="Search tabs…" autocomplete="off" />

  <div class="preview-head">
    <div class="mode-switch" title="How to decide the groups">
      <button id="mode-rules" class="mode active">Rules</button>
      <button id="mode-topics" class="mode">✦ Topics</button>
    </div>
    <span class="preview-label">drag tabs to adjust</span>
    <button id="reset-moves" class="link hidden">Reset moves</button>
  </div>
  <div id="preview"></div>

  <div id="status" class="status"></div>

  <script src="categorizer.js"></script>
  <script src="smartgroup.js"></script>
  <script src="popup.js"></script>
</body>
</html>
